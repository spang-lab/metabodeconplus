# Documentation lint: report functions missing @author / lifecycle tags.
# Currently informational only (no --strict); flip to --strict once the
# remaining entries are addressed.
name: lint-docs
permissions: read-all
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Check @author tags
        run: Rscript scripts/check-authors.R --missing-only

      - name: Check lifecycle tags
        run: Rscript scripts/check-lifecycle.R --missing-only
