# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
name: R-CMD-check
permissions: read-all
on: {
  # DIAGNOSTIC (fix/test-mdm-windows-crash): pull_request trigger paused while
  # the crash-repro stress workflow runs, to avoid 26 slow jobs per push.
  # Restore before merge.
  push: {branches: [main, master]},
  workflow_dispatch: {}
}
jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: '${{ matrix.config.grp }} try-${{ matrix.config.try }}'
    strategy:
      fail-fast: false
      matrix:
        # DIAGNOSTIC (branch fix/test-mdm-windows-crash): 3-way crash A/B under
        # faithful conditions (parallel + full suite). Revert before merge.
        #   CTRL  = old cv.glmnet(keep=TRUE) binomial   (MDM_NOFIX=1)
        #   FIXB  = manual stratified CV, binomial      (still uses lognet)
        #   FIXG  = manual stratified CV, gaussian      (avoids lognet)
        config:
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '1', fam: 'binomial', grp: 'CTRL', try: 1}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '1', fam: 'binomial', grp: 'CTRL', try: 2}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '1', fam: 'binomial', grp: 'CTRL', try: 3}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '1', fam: 'binomial', grp: 'CTRL', try: 4}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '1', fam: 'binomial', grp: 'CTRL', try: 5}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '1', fam: 'binomial', grp: 'CTRL', try: 6}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'binomial', grp: 'FIXB', try: 1}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'binomial', grp: 'FIXB', try: 2}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'binomial', grp: 'FIXB', try: 3}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'binomial', grp: 'FIXB', try: 4}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'binomial', grp: 'FIXB', try: 5}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'binomial', grp: 'FIXB', try: 6}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'binomial', grp: 'FIXB', try: 7}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'binomial', grp: 'FIXB', try: 8}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'binomial', grp: 'FIXB', try: 9}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'binomial', grp: 'FIXB', try: 10}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'gaussian', grp: 'FIXG', try: 1}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'gaussian', grp: 'FIXG', try: 2}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'gaussian', grp: 'FIXG', try: 3}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'gaussian', grp: 'FIXG', try: 4}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'gaussian', grp: 'FIXG', try: 5}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'gaussian', grp: 'FIXG', try: 6}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'gaussian', grp: 'FIXG', try: 7}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'gaussian', grp: 'FIXG', try: 8}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'gaussian', grp: 'FIXG', try: 9}
          - {os: windows-latest, r: 'release', test: 'fast', nofix: '0', fam: 'gaussian', grp: 'FIXG', try: 10}
    # NB: RUN_SLOW_TESTS is intentionally NOT set at the job level. The
    # per-step configuration below enables it only for the `all` and `nobioc`
    # runs, so the `fast` jobs (macOS/Windows/older R) skip the slow, network-
    # dependent tests (75 MB example-datasets download, etc.).
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      MDM_FILTER: ''
      MDM_NOFIX: ${{ matrix.config.nofix }}
      MDM_FAM: ${{ matrix.config.fam }}
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # DIAGNOSTIC: faithful conditions use parallel testthat. Revert before merge.
      - name: Configure testthat parallel (true)
        shell: bash
        run: |
          sed -i "s#^Config/testthat/parallel:.*#Config/testthat/parallel: true#" DESCRIPTION
          echo "DESCRIPTION parallel setting:"; grep "Config/testthat/parallel" DESCRIPTION

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          extra-repositories: https://spang-lab.r-universe.dev

      - name: Set up R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # The Rust backend 'mdrb' is optional. R-Universe ships pre-built
      # binaries only for the two most recent R releases; on older R or
      # platforms without a binary (e.g. Windows) it is unavailable and the
      # Rust-backend tests skip themselves. This step is best-effort so a
      # failed/absent install never fails the job.
      - name: Install optional Rust backend (mdrb, best-effort)
        continue-on-error: true
        run: Rscript -e 'if (getRversion() >= "4.2") try(install.packages("mdrb", repos = "https://spang-lab.r-universe.dev"))'

      - name: Install MacOS System Dependencies
        if: runner.os == 'macOS'
        uses: r-hub/actions/setup-r-sysreqs@v1
        with: { type: "minimal" }

      - name: Install Linux System Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y libgsl0-dev

      - name: Test package (fast tests only)
        uses: r-lib/actions/check-r-package@v2
        if: ${{ matrix.config.test == 'fast' }}
        env:
          _R_CHECK_FORCE_SUGGESTS_: FALSE

      - name: Test package (incl. slow tests)
        uses: r-lib/actions/check-r-package@v2
        if: ${{ matrix.config.test == 'all' }}
        env:
          _R_CHECK_FORCE_SUGGESTS_: FALSE
          RUN_SLOW_TESTS: TRUE

      - name: Test package (with Bioconductor dependencies removed)
        if: ${{ matrix.config.test == 'nobioc' }}
        run: |
          export _R_CHECK_FORCE_SUGGESTS_=FALSE
          export RUN_SLOW_TESTS=TRUE
          Rscript -e "remove.packages(c('MassSpecWavelet', 'impute'))"
          cd ..
          R CMD INSTALL --install-tests metabodeconplus
          Rscript -e "testthat::test_package('metabodeconplus')"
          R CMD build metabodeconplus
          R CMD check --no-manual --as-cran metabodeconplus_*.tar.gz
